# ============================================================================
# Strategy parameters — committed defaults.
# Override via STRATEGY=<name> in .env to select; tuning lives in this file.
# Mitigations from MASTER_BLUEPRINT.md §1.5 are inline-commented with their
# section number.
# ============================================================================

price_action_maker:
  pivots:
    lookback: 2
    # §1.5.2 — pivot lag handling is structural, not a toggle:
    # tentative_pivots track candidates; confirmed_pivots feed the state machine.
    # Confusing the two re-introduces look-ahead bias.

  liquidity:
    young_trend_max_tlq_breaks: 3
    cold_start_lookback_candles: 200      # §6.2.9 — ~16h of 5min data

  efficiency:
    ipa_consecutive_miss_threshold: 2

  hunt:
    sweep_min_breach_bps: 1               # §1.5.9 — 1 bp of level (e.g. $10 at $100k BTC)
    break_min_breach_bps: 1
    touch_includes_wick: true

  snd_zones:
    enabled_patterns:                     # §1.5.3 — Tier-A only
      - inside_bar
      - doji
      - dbd
      - rbd
      - snd_gap
    disabled_patterns_pending_validation: # §1.5.3 — Tier-B stubbed, OFF
      - apex
      - a_shape
      - left_shoulder
      - sbr
    base_min_candles: 1
    base_max_candles: 6
    doji_body_ratio: 0.10
    dbd_min_leg_bps: 5                    # min size of drop legs in DBD (in bps)
    rbd_min_leg_bps: 5
    inside_bar_max_overlap_pct: 100
    freshness_half_life_minutes: 30       # §1.5.5
    max_age_minutes: 120                  # hard expiry

  scan_protocol:
    early_warning_at_s: 180               # Alert 2 — UI only, never triggers orders (§6.2.10)
    confirmation_at_s: 300                # Alert 3 — execution

  invalidation:
    standard_close_buffer_bps: 0

  htf_filter:                             # §1.5.6
    enabled: true
    timeframe: "1h"
    ema_period: 50
    against_trend_confidence_multiplier: 0.5

  volume_filter:                          # §1.5.4 — OFF by default to stay faithful to original
    enabled: false
    min_volume_ratio_at_zone_form: 1.0
    min_volume_ratio_at_rejection: 1.2

  event_filter:                           # §1.5.7
    enabled: true
    block_minutes_before_event: 5
    block_minutes_after_event: 10
    blocked_event_impact: ["high"]
    blocked_currencies: ["USD"]

  signal_confidence:                      # §6.2.8
    min_signal_confidence: 0.55
    continuation_priors_path: "state/continuation_priors.json"
    fail_open: false                      # if priors missing -> REFUSE live (§7 Phase 3)

  execution:
    entry:
      method: join_best                   # join_best | improve_one_tick | passive_mid
      min_book_depth_shares: 50
    exit:
      take_profit_ticks: 5
      stop_loss_ticks: 8
      time_exit_s_before_close: 30
    sizing:
      kelly_fraction: 0.25                # quarter-Kelly
      hard_cap_pct_of_bankroll: 5
      use_continuation_prob_for_kelly: true   # §1.5.1
