repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key            # extra guard against leaking POLYMARKET_PRIVATE_KEY
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5
          - pydantic-settings>=2.1
          - typer>=0.9
          - types-PyYAML
        args: [--strict, --ignore-missing-imports]
        files: ^(src/|config/)
        exclude: ^src/polybot/(truth|signal|poly|engine|risk|persistence|obs|sim|backtest)/(?!__init__\.py$).+$

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast unit tests)
        entry: pytest tests/unit -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
